name: Publish

on:
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10
          cache: false
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
      - name: Install dependencies
        run: pnpm install --ignore-scripts
      - name: Build
        run: pnpm run build
      - name: Publish to NPM (with provenance)
        run: |
          npm i -g npm
          npm publish --tag ${{ github.event.release.prerelease && 'next' || 'latest' }}
